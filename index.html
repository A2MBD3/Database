<body>

    <script>
        const t2 = Date.now();
        document.write('<script src="portfolio/script.js"><\/script>');

    <script>
        (function() {
            const files = [
                'style.css',
                'script.js', 
                'a2mbd3.json'
            ];
            
            files.forEach(file => {
                fetch(`https://purge.jsdelivr.net/gh/A2MBD3/Database/portfolio/${file}`)
                    .then(response => {
                        if (response.ok) {
                            console.log(`✅ Purged: ${file}`);
                        } else {
                            console.log(`⚠️ Failed: ${file} (Status: ${response.status})`);
                        }
                    })
                    .catch(error => {
                        console.log(`❌ Error: ${file}`, error);
                    });
            });
        })();
    </script>
</body>
